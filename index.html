<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ماشین حساب حرفه‌ای</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --calc-bg: #16213e;
      --display-bg: #0f3460;
      --text: #fff;
      --text-secondary: #a0a0a0;
      --btn-num: #1a1a2e;
      --btn-op: #e94560;
      --btn-func: #533483;
      --btn-clear: #0f3460;
      --result-color: #e94560;
    }
    .light-theme {
      --bg: #f0f0f0;
      --calc-bg: #ffffff;
      --display-bg: #e8e8e8;
      --text: #333;
      --text-secondary: #666;
      --btn-num: #fff;
      --btn-op: #ff6b35;
      --btn-func: #7c3aed;
      --btn-clear: #e8e8e8;
      --result-color: #ff6b35;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Tahoma', sans-serif;
    }
    .calc {
      background: var(--calc-bg);
      border-radius: 25px;
      padding: 20px;
      width: 360px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
    }
    .top-bar button {
      background: var(--btn-func);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.15s;
    }
    .top-bar button:active { transform: scale(0.92); filter: brightness(1.3); }
    .display {
      background: var(--display-bg);
      border-radius: 15px;
      padding: 25px 20px;
      margin-bottom: 20px;
      min-height: 120px;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }
    .display .expr {
      color: var(--text-secondary);
      min-height: 24px;
      word-wrap: break-word;
      margin-bottom: 8px;
      transition: font-size 0.2s ease;
    }
    .display .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .display .result {
      color: var(--result-color);
      font-weight: bold;
      word-wrap: break-word;
      transition: font-size 0.2s ease;
      line-height: 1.2;
    }
    .display .copy-btn {
      background: var(--btn-func);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .history-panel {
      background: var(--display-bg);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      color: var(--text);
      max-height: 150px;
      overflow-y: auto;
      display: none;
      font-size: 14px;
    }
    .history-panel.show { display: block; }
    .history-item {
      padding: 8px;
      border-bottom: 1px solid var(--text-secondary);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }
    .history-item:hover { background: var(--btn-func); opacity: 0.8; }
    .history-item .hist-expr { color: var(--text-secondary); font-size: 13px; }
    .history-item .hist-result { color: var(--result-color); font-weight: bold; }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    button {
      border: none;
      border-radius: 15px;
      font-size: 20px;
      padding: 18px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: bold;
      color: var(--text);
    }
    button:active { transform: scale(0.92); filter: brightness(1.3); }
    .btn-num { background: var(--btn-num); }
    .btn-op { background: var(--btn-op); color: white; }
    .btn-func { background: var(--btn-func); color: white; font-size: 16px; }
    .btn-clear { background: var(--btn-clear); color: var(--result-color); }
  </style>
</head>
<body>
<div class="calc">
  <div class="top-bar">
    <button onclick="toggleHistory()">📋 تاریخچه</button>
    <button onclick="toggleMode()" id="modeBtn">⚙️ حالت مهندسی</button>
    <button onclick="toggleTheme()" id="themeBtn">🌙 تم تیره</button>
  </div>
  <div class="history-panel" id="historyPanel"></div>
  <div class="display">
    <div class="expr" id="expression"></div>
    <div class="result-row">
      <div class="result" id="result">۰</div>
      <button class="copy-btn" onclick="copyResult()">📋 کپی</button>
    </div>
  </div>
  <div class="buttons" id="buttons"></div>
</div>

<script>
  let expr = '', result = '۰', sci = false, history = [];
  const exprEl = document.getElementById('expression'), resultEl = document.getElementById('result');
  const btnsEl = document.getElementById('buttons'), historyPanel = document.getElementById('historyPanel');
  const modeBtn = document.getElementById('modeBtn'), themeBtn = document.getElementById('themeBtn');

  const basic = [['C','()','%','÷'],['7','8','9','×'],['4','5','6','-'],['1','2','3','+'],['0','.','=','⌫']];
  const scientific = [['sin','cos','tan','π'],['log','ln','√','^'],['7','8','9','÷'],['4','5','6','×'],['1','2','3','-'],['0','.','=','+'],['C','()','%','⌫']];

  function update() {
    exprEl.textContent = expr || ' ';
    resultEl.textContent = result;

    // اندازه هوشمند فونت برای عدد
    const len = result.length;
    let fontSize = 40;
    if (len > 12) fontSize = 22;
    else if (len > 10) fontSize = 26;
    else if (len > 8) fontSize = 30;
    else if (len > 6) fontSize = 36;
    resultEl.style.fontSize = fontSize + 'px';

    // اندازه فونت عبارت
    const exprLen = expr.length;
    let exprFontSize = 16;
    if (exprLen > 25) exprFontSize = 12;
    else if (exprLen > 20) exprFontSize = 14;
    exprEl.style.fontSize = exprFontSize + 'px';
  }

  function vibrate() {
    if (navigator.vibrate) navigator.vibrate(10);
  }

  function cleanExpr(str) {
    return str.replace(/π/g, 'PI')
              .replace(/√\(/g, 'sqrt(')
              .replace(/\^/g, '**')
              .replace(/sin\(/g, 'sin(')
              .replace(/cos\(/g, 'cos(')
              .replace(/tan\(/g, 'tan(')
              .replace(/log\(/g, 'log10(')
              .replace(/ln\(/g, 'log(')
              .replace(/÷/g, '/')
              .replace(/×/g, '*')
              .replace(/%/g, '/100');
  }

  function calc() {
    if (!expr) {
      result = '۰';
      return;
    }
    try {
      let e = cleanExpr(expr);
      let res = eval(e);
      if (Number.isFinite(res) && !isNaN(res)) {
        result = res.toString();
      } else {
        result = '?';
      }
    } catch {
      result = '?';
    }
  }

  function addToHistory(exprText, resultText) {
    if (!exprText || resultText === '?' || resultText === 'خطا') return;
    history.unshift({ expr: exprText, result: resultText });
    if (history.length > 15) history.pop();
    renderHistory();
  }

  function renderHistory() {
    historyPanel.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="useHistory(${i})">
        <span class="hist-expr">${h.expr}</span>
        <span class="hist-result">${h.result}</span>
      </div>
    `).join('');
  }

  function useHistory(index) {
    expr = history[index].result;
    result = '۰';
    historyPanel.classList.remove('show');
    update();
  }

  function toggleHistory() {
    historyPanel.classList.toggle('show');
  }

  function copyResult() {
    if (result && result !== '?' && result !== '۰' && result !== 'خطا') {
      navigator.clipboard.writeText(result).then(() => {
        alert('نتیجه کپی شد: ' + result);
      });
    }
  }

  function tap(v) {
    vibrate();
    if (v === 'C') {
      expr = '';
      result = '۰';
    } else if (v === '⌫') {
      expr = expr.slice(0, -1);
      expr ? calc() : (result = '۰');
    } else if (v === '=') {
      calc();
      if (result !== '?' && result !== 'خطا') {
        addToHistory(expr, result);
        expr = result;
        result = '۰';
      }
    } else if (['sin','cos','tan','log','ln','√'].includes(v)) {
      expr += v + '(';
      result = '?';
    } else {
      expr += v;
      calc();
    }
    update();
  }

  function build(arr) {
    btnsEl.innerHTML = '';
    arr.forEach(row => row.forEach(b => {
      const btn = document.createElement('button');
      btn.textContent = b;
      if (['÷','×','-','+','=','^','%'].includes(b)) btn.className = 'btn-op';
      else if (['sin','cos','tan','log','ln','√','π'].includes(b)) btn.className = 'btn-func';
      else if (b === 'C') btn.className = 'btn-clear';
      else btn.className = 'btn-num';
      btn.onclick = () => tap(b);
      btnsEl.appendChild(btn);
    }));
  }

  function toggleMode() {
    sci = !sci;
    modeBtn.textContent = sci ? '🔢 حالت ساده' : '⚙️ حالت مهندسی';
    build(sci ? scientific : basic);
  }

  function toggleTheme() {
    document.body.classList.toggle('light-theme');
    themeBtn.textContent = document.body.classList.contains('light-theme') ? '☀️ تم روشن' : '🌙 تم تیره';
  }

  build(basic);
  update();
</script>
</body>
</html>
